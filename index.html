<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Todo List</title><script defer="defer" src="main.js"></script></head><body><h1>Todo List</h1><main><dialog id="new-project-dialog" closedby="any"><form method="dialog"><label for="proj-name">Name:</label> <input title="Project name" name="name" id="proj-name" maxlength="20" required> <button type="submit">Create Project</button></form><button commandfor="new-project-dialog" command="close">Close</button></dialog><dialog id="new-todo-dialog" closedby="any"><form method="dialog"><div><label for="title">Title:</label> <input name="title" id="title" required></div><div><label for="todo-description">Description:</label> <input name="description" id="todo-description" required></div><div><label for="todo-due-date">Due date:</label> <input type="date" name="dueDate" id="todo-due-date" required></div><div><label for="todo-priority">Priority</label> <select name="priority" id="todo-priority" required><option value="">Choose priority</option><option value="low">Low</option><option value="high">High</option></select></div><button type="submit">Create Todo</button></form><button commandfor="new-todo-dialog" command="close">Close</button></dialog><dialog id="edit-todo-dialog" closedby="any"><form method="dialog"><div><label for="title">Title:</label> <input name="title" id="title" required></div><div><label for="todo-description">Description:</label> <input name="description" id="todo-description" required></div><div><label for="todo-due-date">Due date:</label> <input type="date" name="dueDate" id="todo-due-date" required></div><div><label for="todo-priority">Priority</label> <select name="priority" id="todo-priority" required><option value="">Choose priority</option><option value="low">Low</option><option value="high">High</option></select></div><button type="submit">Edit Todo</button></form><button commandfor="edit-todo-dialog" command="close">Close</button></dialog><section class="projects"><h2>Projects</h2><button class="new-button" command="show-modal" commandfor="new-project-dialog">New project</button><ul class="project-list"></ul></section><section class="todos"><h2>Todos</h2><button class="new-button" command="show-modal" commandfor="new-todo-dialog">New todo</button><ul class="todo-list"></ul></section></main></body></html>
